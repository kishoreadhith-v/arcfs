name: ArcFS CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps (FUSE)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfuse3-dev

      - name: Cargo check
        id: cargo_check
        run: cargo check -q

      - name: Summary - cargo check
        if: always()
        run: |
          {
            echo "## ArcFS CI Summary"
            echo "- Suite: cargo check"
            echo "- Status: ${{ steps.cargo_check.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Architecture compliance checks
        id: architecture
        run: ./tests/architecture_compliance.sh

      - name: Summary - architecture
        if: always()
        run: |
          {
            echo "- Suite: architecture_compliance"
            echo "- Status: ${{ steps.architecture.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"
